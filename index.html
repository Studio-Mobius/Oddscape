<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Studio Oddscape</title>

<style>
:root {
    --bg-top: #36424f;
    --bg-mid: #263442;
    --bg-bottom: #1b2530;
    --text: #e7e7e7;
    --muted: #cfd5db;
    --gold: #e0c27a;
    --line: rgba(255,255,255,0.10);
    --button-text: #1b2530;
}

* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    overflow-x: hidden;
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(circle at top, var(--bg-top) 0%, var(--bg-mid) 55%, var(--bg-bottom) 100%);
    color: var(--text);
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
}

img {
    max-width: 100%;
    display: block;
}

a {
    color: inherit;
    text-decoration: none;
}

header {
    padding: 34px 20px 18px;
    text-align: center;
}

h1 {
    margin: 0;
    font-size: clamp(44px, 8vw, 72px);
    font-weight: 700;
    letter-spacing: -1.5px;
    line-height: 1.05;
    color: var(--gold);
    text-shadow: 0 2px 10px rgba(0,0,0,0.28);
}

.hero-image-wrap {
    width: 100%;
    overflow: hidden;
    background: #111;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
}

.hero-image {
    width: 100%;
    height: auto;
    pointer-events: none;
    -webkit-user-drag: none;
    user-drag: none;
}

.hero {
    text-align: center;
    padding: 42px 20px 56px;
}

.hero h2 {
    margin: 0 0 12px;
    font-size: clamp(34px, 8vw, 64px);
    line-height: 1.08;
    letter-spacing: -1px;
    font-weight: 700;
    color: #f2f2f2;
}

.hero p {
    margin: 0;
    font-size: clamp(20px, 4.2vw, 34px);
    color: var(--muted);
    line-height: 1.35;
    font-weight: 400;
}

.section {
    width: 100%;
    max-width: 980px;
    margin: 0 auto;
    padding: 0 42px 48px;
}

.section h3 {
    margin: 0 0 18px;
    font-size: clamp(32px, 7vw, 56px);
    line-height: 1.1;
    letter-spacing: -1px;
    color: var(--gold);
    font-weight: 700;
}

.rule {
    width: 100%;
    height: 1px;
    background: var(--line);
    margin: 0 0 34px;
}

.section p {
    margin: 0 0 28px;
    font-size: clamp(20px, 4.3vw, 30px);
    color: #e4e7ea;
    line-height: 1.65;
    font-weight: 400;
}

.context-title {
    margin-top: 14px;
    margin-bottom: 10px;
    font-size: clamp(20px, 4.3vw, 30px);
    font-weight: 700;
    color: #f1f1f1;
}

.terrain-section {
    padding-top: 8px;
}

.terrain-section .lead {
    margin-bottom: 28px;
}

.terrain-lines {
    margin: 28px 0 38px;
}

.terrain-lines p {
    margin: 0 0 18px;
}

.cta-wrap {
    text-align: center;
    padding: 10px 0 8px;
}

.cta-button {
    display: inline-block;
    background: var(--gold);
    color: var(--button-text);
    font-size: clamp(22px, 4.6vw, 32px);
    font-weight: 700;
    padding: 20px 34px;
    border-radius: 18px;
    box-shadow: 0 8px 22px rgba(0,0,0,0.18);
    transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
}

.cta-button:hover,
.cta-button:focus {
    transform: translateY(-1px);
    box-shadow: 0 10px 26px rgba(0,0,0,0.22);
    opacity: 0.98;
}

footer {
    max-width: 980px;
    margin: 0 auto;
    padding: 26px 42px 60px;
    text-align: center;
    color: var(--muted);
}

.footer-rule {
    width: 100%;
    height: 1px;
    background: var(--line);
    margin: 0 0 34px;
}

.footer-brand {
    font-size: clamp(20px, 4.3vw, 30px);
    line-height: 1.45;
    margin-bottom: 18px;
}

.footer-meta {
    font-size: clamp(16px, 3.6vw, 24px);
    line-height: 1.7;
    color: rgba(231,231,231,0.86);
}
